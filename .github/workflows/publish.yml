# Publishes all test fixture packages with provenance via trusted publishing.
# Trigger by pushing a tag: git tag v2.0.0 && git push origin v2.0.0
#
# Prerequisites: configure a trusted publisher on npmjs.com for each package
# pointing to dsp-testing/pfw-test-fixtures with workflow publish.yml.
#
# v1.0.0 should be published locally first (no provenance baseline).
name: Publish with provenance

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - pfw-test-install-script
          - pfw-test-attestation
          - pfw-test-combined
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish ${{ matrix.package }} with provenance
        working-directory: packages/${{ matrix.package }}
        run: npm publish --provenance --access public
